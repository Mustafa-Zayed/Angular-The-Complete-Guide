<h2>Authenticate to access all resources</h2>
<form (ngSubmit)="onSubmit()">
  <p>
    <label>E-Mail</label>
    <input type="email" name="email" [(ngModel)]="email" />
  </p>

  <!-- ngModel besides allowing us to perform the two way data binding, it's also an attribute directive 
  that enhances the element with additional behavior like dynamically styling elements based on 
  CSS classes like ng-valid, ng-invalid, and ng-pristine etc. -->
  <p>
    <label>Password</label>
    <input type="password" name="password" [(ngModel)]="password" />
  </p>

  <p>
    <button>Login</button>
  </p>
</form>
