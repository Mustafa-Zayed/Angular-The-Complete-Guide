@if (newTaskDialog) {
  <app-new-task
    [userId]="userId()"
    (submitTask)="saveNewTask($event)"
    (cancelTask)="closeNewTaskModal()"
  />
}

<section id="tasks">
  <header>
    <h2>{{ userName() }}'s Tasks</h2>
    <menu>
      <button (click)="showTaskDialog()">Add Task</button>
    </menu>
  </header>

  <ul>
    @for (task of selectedUserTasks(); track $index) {
      <li>
        <app-task [task]="task" (taskComplete)="onCompleteTask($event)" />
      </li>
    }
  </ul>
</section>
