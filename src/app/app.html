<app-header />

<main>
  <ul id="users">
    @for (user of dummyUsers; track $index) {
      <li>
        <app-user [user]="user" (select)="onUserSelected($event)" [activeUser]="user.id === selectedUserId" />
      </li>
    }
  </ul>
  @if (userName) {
    <app-tasks [userName]="userName" />
  } @else {
    <p id="fallback">Select a user to see their tasks!</p>
  }
</main>
